<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>個人設定</title>
  <style>
    :root { var(--primary-color: #2196f3); }
    body{font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;max-width:800px;margin:20px auto;padding:0 14px;background:#f9f9f9;color:#333}
    .card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:25px;margin-bottom:20px;box-shadow:0 4px 6px rgba(0,0,0,0.02)}
    h2{margin-top:0;border-bottom:1px solid #eee;padding-bottom:15px;margin-bottom:20px;color:#444;font-size:1.5rem}
    label{display:block;margin-bottom:8px;font-weight:bold;color:#555}
    select, button, input[type="file"]{padding:10px;border-radius:8px;border:1px solid #ccc;font-size:14px;width:100%;max-width:100%;box-sizing:border-box;}
    
    .section-label { font-size: 14px; color: #666; margin-bottom: 12px; border-left: 4px solid var(--primary-color); padding-left: 8px; font-weight: bold; }
    .hint { font-size: 12px; color: #777; margin-top: 4px; line-height: 1.4; }

    /* 配色選項卡 */
    .theme-group-title { font-size: 13px; color: #888; margin: 15px 0 10px; display: flex; align-items: center; gap: 8px; }
    .theme-group-title::after { content: ""; flex: 1; height: 1px; background: #eee; }
    .theme-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .theme-card { border: 1px solid #eee; border-radius: 10px; padding: 12px; cursor: pointer; text-align: center; transition: all 0.2s; position: relative; background: #fff; }
    .theme-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.08); border-color: #ddd; }
    .theme-card.active { border-color: var(--primary-color); background-color: rgba(33, 150, 243, 0.05); border-width: 2px; }
    .color-preview { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
    .color-dot { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.05); }
    .theme-name { font-size: 13px; font-weight: 500; color: #444; }
    
    .btn-save { background:#2196f3; color:white; border:none; font-weight:bold; cursor:pointer; width:100%; padding:12px; margin-top: 10px; }
    .btn-save:hover { background:#1976d2; }
    
    /* 影片上傳區塊樣式 */
    .upload-box { background:#f5f5f5; padding:15px; border-radius:8px; margin-bottom: 15px; border: 1px solid #eee; }
    .upload-title { font-weight: bold; margin-bottom: 10px; color: #333; display: flex; align-items: center; gap: 8px; }
    .btn-upload { background:#ff9800; color:white; border:none; font-weight:bold; cursor:pointer; width:auto; padding:8px 16px; margin-top: 8px; }
    .btn-upload:hover { background:#f57c00; }
    .btn-upload:disabled { background:#ccc; cursor:not-allowed; }

    .progress-bar { height: 6px; background: #ddd; margin-top: 10px; border-radius: 3px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.2s; }
    
    .preview-box { margin-top: 10px; display: none; background: #000; padding: 10px; border-radius: 8px; }
    video { width: 100%; max-height: 200px; display:block; margin:0 auto; }

    .msg { margin-top:15px; color:#2e7d32; font-weight:bold; display:none; padding: 10px; background: #e8f5e9; border-radius: 6px; text-align: center; }
    .err-msg { color: #d32f2f; font-size: 13px; margin-top: 5px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="card">
    <h2>⚙️ 系統與個人設定</h2>
    
    <div style="margin-bottom:30px;">
      <div class="section-label">1. 預設登入場域</div>
      <div class="hint" style="margin-bottom:10px;">設定後，每次登入系統將自動為您選定該場域。</div>
      <select id="default_site_sel"><option value="">(無) 請選擇...</option></select>
    </div>

    <div style="margin-bottom:30px;">
      <div class="section-label">2. 介面配色風格</div>
      <div class="theme-group-title">☀️ 淺色模式</div>
      <div class="theme-grid">
        <div class="theme-card" onclick="selectTheme('light')" id="th_light"><div class="color-preview"><div class="color-dot" style="background:#fff;"></div><div class="color-dot" style="background:#2196f3;"></div></div><div class="theme-name">經典白</div></div>
        <div class="theme-card" onclick="selectTheme('soft_blue')" id="th_soft_blue"><div class="color-preview"><div class="color-dot" style="background:#fff;"></div><div class="color-dot" style="background:#03a9f4;"></div></div><div class="theme-name">天空藍</div></div>
        <div class="theme-card" onclick="selectTheme('rose')" id="th_rose"><div class="color-preview"><div class="color-dot" style="background:#fff;"></div><div class="color-dot" style="background:#e91e63;"></div></div><div class="theme-name">玫瑰紅</div></div>
        <div class="theme-card" onclick="selectTheme('mint')" id="th_mint"><div class="color-preview"><div class="color-dot" style="background:#fff;"></div><div class="color-dot" style="background:#00bfa5;"></div></div><div class="theme-name">薄荷綠</div></div>
        <div class="theme-card" onclick="selectTheme('amber')" id="th_amber"><div class="color-preview"><div class="color-dot" style="background:#fff;"></div><div class="color-dot" style="background:#ff8f00;"></div></div><div class="theme-name">琥珀橘</div></div>
      </div>
      <div class="theme-group-title">🌙 深色模式</div>
      <div class="theme-grid">
        <div class="theme-card" onclick="selectTheme('dark')" id="th_dark"><div class="color-preview"><div class="color-dot" style="background:#1e1e1e;"></div><div class="color-dot" style="background:#90caf9;"></div></div><div class="theme-name">標準深灰</div></div>
        <div class="theme-card" onclick="selectTheme('midnight')" id="th_midnight"><div class="color-preview"><div class="color-dot" style="background:#0a0e14;"></div><div class="color-dot" style="background:#bb86fc;"></div></div><div class="theme-name">極致黑</div></div>
        <div class="theme-card" onclick="selectTheme('forest_dark')" id="th_forest_dark"><div class="color-preview"><div class="color-dot" style="background:#1b2e1c;"></div><div class="color-dot" style="background:#81c784;"></div></div><div class="theme-name">深林綠</div></div>
        <div class="theme-card" onclick="selectTheme('lava')" id="th_lava"><div class="color-preview"><div class="color-dot" style="background:#210b05;"></div><div class="color-dot" style="background:#ff7043;"></div></div><div class="theme-name">岩漿紅</div></div>
        <div class="theme-card" onclick="selectTheme('ocean_dark')" id="th_ocean_dark"><div class="color-preview"><div class="color-dot" style="background:#001a2c;"></div><div class="color-dot" style="background:#4fc3f7;"></div></div><div class="theme-name">深海藍</div></div>
      </div>
      <input type="hidden" id="selected_theme" value="light">
      <button class="btn-save" onclick="saveSettings()">儲存偏好設定</button>
      <div id="msg" class="msg">✨ 設定已儲存！</div>
    </div>

    <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">

    <div>
      <div class="section-label">4. 帳號安全</div>
      <div class="hint" style="margin-bottom:15px;">在此修改您的登入密碼。若忘記密碼，請聯繫場域工程師協助重設。</div>
      
      <div style="background:#fff3e0; padding:15px; border-radius:8px; border:1px solid #ffe0b2;">
        <label>新密碼</label>
        <input type="password" id="new_password" placeholder="請輸入新密碼 (至少 6 碼)">
        
        <label style="margin-top:10px;">確認新密碼</label>
        <input type="password" id="confirm_password" placeholder="請再次輸入新密碼">
        
        <button class="btn-save" style="background:#ff9800; margin-top:15px;" onclick="changeMyPassword()">🔒 修改密碼</button>
        <div id="pw_msg" class="err-msg" style="text-align:center;"></div>
      </div>
    </div>

    <div>
      <div class="section-label">3. 個人化登入/登出動畫</div>
      <div class="hint" style="margin-bottom:15px;">此影片僅供您個人使用。若未設定，則不會播放動畫。</div>
      
      <div class="upload-box">
          <div class="upload-title">🎬 您的登入影片 (Intro)</div>
          <input type="file" id="file_intro" accept="video/mp4,video/webm">
          
          <div class="progress-bar" id="p_bar_intro"><div class="progress-fill" id="p_fill_intro"></div></div>
          <div id="msg_intro" class="err-msg" style="color:#333;"></div>
          
          <button id="btn_intro" class="btn-upload" onclick="uploadVideo('intro')">⬆️ 上傳個人登入影片</button>

          <div class="preview-box" id="preview_intro_box">
            <div style="color:#fff; font-size:12px; margin-bottom:5px;">目前設定：</div>
            <video id="vid_intro" controls playsinline></video>
          </div>
      </div>

      <div class="upload-box">
          <div class="upload-title">👋 您的登出影片 (Outro)</div>
          <input type="file" id="file_outro" accept="video/mp4,video/webm">
          
          <div class="progress-bar" id="p_bar_outro"><div class="progress-fill" id="p_fill_outro"></div></div>
          <div id="msg_outro" class="err-msg" style="color:#333;"></div>
          
          <button id="btn_outro" class="btn-upload" onclick="uploadVideo('outro')">⬆️ 上傳個人登出影片</button>

          <div class="preview-box" id="preview_outro_box">
            <div style="color:#fff; font-size:12px; margin-bottom:5px;">目前設定：</div>
            <video id="vid_outro" controls playsinline></video>
          </div>
      </div>

    </div>

  </div>

<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://whbllncddoqbwukstxel.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_-uGXQX02_yogpjSRjVQImA_FVcaqfQ2";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const $ = id => document.getElementById(id);

    // ★★★ 關鍵修正：加入 Session 檢查的修改密碼函式 ★★★
    window.changeMyPassword = async () => {
        const p1 = $("new_password").value;
        const p2 = $("confirm_password").value;
        const msg = $("pw_msg");
        const btn = event.target; // 抓取按鈕
        
        msg.textContent = "";
        
        // 1. 基礎檢查
        if(!p1 || p1.length < 6) {
            msg.textContent = "❌ 密碼長度至少需 6 碼";
            msg.style.color = "#d32f2f";
            return;
        }
        if(p1 !== p2) {
            msg.textContent = "❌ 兩次輸入的密碼不符";
            msg.style.color = "#d32f2f";
            return;
        }

        // 2. 鎖定按鈕
        const orgText = btn.textContent;
        btn.textContent = "驗證身分中...";
        btn.disabled = true;

        try {
            // ★ 強制檢查 Session 是否存在
            const { data: { session }, error: sessionError } = await supabase.auth.getSession();
            
            if (sessionError || !session) {
                // 若 session 遺失，嘗試重新整理 session
                const { data: refreshData, error: refreshError } = await supabase.auth.refreshSession();
                if (refreshError || !refreshData.session) {
                    throw new Error("您的登入時效已過，請重新登入後再試。");
                }
            }

            // 3. session 存在，執行修改
            btn.textContent = "修改中...";
            const { data, error } = await supabase.auth.updateUser({
                password: p1
            });

            if(error) throw error;

            // 4. 成功
            msg.textContent = "✅ 密碼修改成功！下次請用新密碼登入。";
            msg.style.color = "#2e7d32";
            $("new_password").value = "";
            $("confirm_password").value = "";

        } catch (err) {
            console.error(err);
            // 針對 Auth session missing 做白話提示
            if (err.message && err.message.includes("Auth session missing")) {
                msg.textContent = "❌ 系統偵測不到您的登入狀態，請重新整理網頁或重新登入。";
            } else {
                msg.textContent = "❌ 修改失敗：" + (err.message || "未知錯誤");
            }
            msg.style.color = "#d32f2f";
        } finally {
            // 解鎖按鈕
            btn.textContent = orgText;
            btn.disabled = false;
        }
    };

    // 設定與偏好
    const BUCKET_NAME = "system_assets";
    let currentUid = null;
    let prefs = { default_site_id: "", theme: "light" };

    async function init(){
        const { data: { session } } = await supabase.auth.getSession();
        if(!session) { 
            // 若此處無 session，可能是在 iframe 中，嘗試通知父層或顯示錯誤
            console.warn("Settings: No session found on init");
            // 這裡不強制跳轉，以免影響操作體驗，但會影響功能
        }
        
        if (session) {
            currentUid = session.user.id;

            // 根據 User ID 讀取設定來回填選單
            const userPrefKey = `prefs_${currentUid}`;
            try {
                const saved = JSON.parse(localStorage.getItem(userPrefKey)) || {};
                if(saved.theme) prefs.theme = saved.theme;
                if(saved.default_site_id) prefs.default_site_id = saved.default_site_id;
            } catch(e) {}

            // 載入場域
            const { data: mems } = await supabase.from("site_memberships").select("site_id").eq("user_id", currentUid).eq("is_active", true);
            if(mems && mems.length > 0){
                const siteIds = mems.map(m => m.site_id);
                const { data: sites } = await supabase.from("sites").select("id, name").in("id", siteIds);
                const sel = $("default_site_sel");
                (sites||[]).forEach(s => {
                    const opt = document.createElement("option");
                    opt.value = s.id; opt.textContent = s.name; sel.appendChild(opt);
                });
                sel.value = prefs.default_site_id || "";
            }
            
            // 檢查現有影片
            checkVideo('intro');
            checkVideo('outro');
        }
        
        // 載入主題 (即使沒登入也先載入預設)
        selectTheme(prefs.theme || "light");
    }

    // --- 主題與場域 ---
    window.selectTheme = (theme) => {
        document.querySelectorAll(".theme-card").forEach(el => el.classList.remove("active"));
        const target = $("th_" + theme); if(target) target.classList.add("active");
        $("selected_theme").value = theme;
        window.parent.postMessage({ type: 'PREVIEW_THEME', theme: theme }, '*');
    };

    window.saveSettings = () => {
        if(!currentUid) return alert("無法識別使用者 ID，請確認是否已登入");

        const newPrefs = { 
            default_site_id: $("default_site_sel").value, 
            theme: $("selected_theme").value 
        };
        const jsonStr = JSON.stringify(newPrefs);

        // 同時儲存兩份 (全域 + 個人)
        localStorage.setItem("app_preferences", jsonStr);
        localStorage.setItem(`prefs_${currentUid}`, jsonStr);

        // 通知父視窗變色
        window.parent.postMessage({ type: 'UPDATE_THEME', theme: newPrefs.theme }, '*');
        $("msg").style.display = "block"; 
        setTimeout(() => $("msg").style.display = "none", 3000);
    };

    // --- 影片上傳邏輯 ---
    async function checkVideo(type) {
        if(!currentUid) return;
        const fileName = `${currentUid}/${type}.mp4`;
        const vidId = type === 'intro' ? 'vid_intro' : 'vid_outro';
        const boxId = type === 'intro' ? 'preview_intro_box' : 'preview_outro_box';

        const { data } = supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
        const videoUrl = `${data.publicUrl}?t=${new Date().getTime()}`;
        
        try {
            const res = await fetch(videoUrl, { method: 'HEAD' });
            if(res.ok) {
                $(boxId).style.display = "block";
                $(vidId).src = videoUrl;
            }
        } catch(e) {}
    }

    window.uploadVideo = async function(type) {
        if(!currentUid) return;
        const fileName = `${currentUid}/${type}.mp4`;
        
        const fileInput = $(type === 'intro' ? 'file_intro' : 'file_outro');
        const msg = $(type === 'intro' ? 'msg_intro' : 'msg_outro');
        const btn = $(type === 'intro' ? 'btn_intro' : 'btn_outro');
        const pBar = $(type === 'intro' ? 'p_bar_intro' : 'p_bar_outro');
        const pFill = $(type === 'intro' ? 'p_fill_intro' : 'p_fill_outro');

        const file = fileInput.files[0];
        msg.textContent = ""; msg.style.color = "#333";

        if (!file) { msg.textContent = "❌ 請選擇檔案"; msg.style.color = "#d32f2f"; return; }
        if (file.size > 100 * 1024 * 1024) { msg.textContent = "❌ 檔案超過 100MB"; msg.style.color = "#d32f2f"; return; }

        btn.disabled = true;
        msg.textContent = "上傳中...";
        pBar.style.display = "block"; pFill.style.width = "10%";

        const { data, error } = await supabase.storage.from(BUCKET_NAME).upload(fileName, file, { cacheControl: '3600', upsert: true });

        pFill.style.width = "100%";
        btn.disabled = false;

        if (error) {
            msg.textContent = "❌ 失敗: " + error.message; msg.style.color = "#d32f2f"; pBar.style.display = "none";
        } else {
            msg.textContent = "✅ 成功！"; msg.style.color = "#2e7d32";
            setTimeout(() => { pBar.style.display = "none"; checkVideo(type); }, 1000);
        }
    };

    init();
</script>
</body>
</html>
